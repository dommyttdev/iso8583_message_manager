[project]
name = "iso8583-types"
version = "0.1.0"
description = "ISO 8583 型定義・インターフェース・例外 (pyiso8583 依存なし)"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "bandit>=1.7.0",
    "iso8583-core",
    "mypy>=1.0.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
]

[tool.uv.sources]
iso8583-core = { path = "../iso8583-core", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py310"
