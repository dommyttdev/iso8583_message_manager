name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  # ──────────────────────────────────────────
  # iso8583-types
  # ──────────────────────────────────────────
  iso8583-types:
    name: iso8583-types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/iso8583-types

    steps:
      - uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: uv インストール
        uses: astral-sh/setup-uv@v7

      - name: 依存関係インストール
        run: uv sync --dev

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: mypy 型チェック
        run: uv run mypy src/

      - name: bandit セキュリティ静的解析
        run: uv run bandit -r src/ -ll --quiet

      - name: pytest + カバレッジ
        run: uv run pytest --cov=iso8583_types --cov-report=term-missing --cov-fail-under=95 --benchmark-disable

  # ──────────────────────────────────────────
  # iso8583-core
  # ──────────────────────────────────────────
  iso8583-core:
    name: iso8583-core
    runs-on: ubuntu-latest
    needs: iso8583-types
    defaults:
      run:
        working-directory: packages/iso8583-core

    steps:
      - uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: uv インストール
        uses: astral-sh/setup-uv@v7

      - name: 依存関係インストール
        run: uv sync --dev

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: mypy 型チェック
        run: uv run mypy src/

      - name: bandit セキュリティ静的解析
        run: uv run bandit -r src/ -ll --quiet

      - name: pytest + カバレッジ
        run: uv run pytest --cov=iso8583_core --cov-report=term-missing --cov-fail-under=95 --benchmark-disable

  # ──────────────────────────────────────────
  # api
  # ──────────────────────────────────────────
  api:
    name: api
    runs-on: ubuntu-latest
    needs: iso8583-core
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: uv インストール
        uses: astral-sh/setup-uv@v7

      - name: 依存関係インストール
        run: uv sync --dev

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: mypy 型チェック
        run: uv run mypy src/

      - name: bandit セキュリティ静的解析
        run: uv run bandit -r src/ -ll --quiet

      - name: pytest + カバレッジ
        run: uv run pytest --cov=iso8583_api --cov-report=term-missing --cov-fail-under=90

  # ──────────────────────────────────────────
  # cli
  # ──────────────────────────────────────────
  cli:
    name: cli
    runs-on: ubuntu-latest
    needs: iso8583-core
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: uv インストール
        uses: astral-sh/setup-uv@v7

      - name: 依存関係インストール
        run: uv sync --dev

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: mypy 型チェック
        run: uv run mypy src/

      - name: bandit セキュリティ静的解析
        run: uv run bandit -r src/ -ll --quiet

      - name: pytest + カバレッジ
        run: uv run pytest --cov=iso8583_cli --cov-report=term-missing --cov-fail-under=90
